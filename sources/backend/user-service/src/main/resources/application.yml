spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:user_svc}
    username: ${DB_USER:user_svc}
    password: ${DB_PASSWORD:user_svc_pw}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Phase 24: cho phép start khi DB chưa healthy (lazy connection) — D-15
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  # Phase 27 / Plan 27-02: messaging — producer user.events (MAIL-02)
  # user-service chỉ là Producer → KHÔNG có listener.simple.retry block
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USER:guest}
    password: ${SPRING_RABBITMQ_PASS:guest}
    publisher-confirm-type: correlated
    publisher-returns: true
  # Multipart limits cho POST /users/me/avatar — phải lớn hơn MAX_SIZE_BYTES (5MB) ở ImageStorageService.
  servlet:
    multipart:
      enabled: true
      max-file-size: 6MB
      max-request-size: 8MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-key-minimum-32-characters-for-hs256-ok}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  google:
    # OAuth Client ID (Web application) từ Google Cloud Console — dùng làm audience khi verify ID token.
    # Để trống thì endpoint /auth/google trả 503; login bằng password vẫn hoạt động.
    client-id: ${GOOGLE_CLIENT_ID:}
  # Avatar upload (hướng a: user-service tự lưu file). Dev mặc định ./uploads (relative cwd container);
  # production dùng env UPLOADS_DIR=/uploads + docker volume mount.
  uploads:
    dir: ${UPLOADS_DIR:./uploads}
    public-url-prefix: /api/users/uploads

---
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    locations: classpath:db/migration,classpath:db/seed-dev
