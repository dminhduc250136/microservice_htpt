spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payment_svc}
    username: ${DB_USER:payment_svc}
    password: ${DB_PASSWORD:payment_svc_pw}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Phase 24: cho phép start khi DB chưa healthy (lazy connection) — D-15
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USER:guest}
    password: ${SPRING_RABBITMQ_PASS:guest}
    publisher-confirm-type: correlated
    publisher-returns: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

momo:
  partner-code: ${MOMO_PARTNER_CODE:MOMO}
  access-key: ${MOMO_ACCESS_KEY:F8BBA842ECF85}
  secret-key: ${MOMO_SECRET_KEY:K951B6PE1waDMi640xX08PD3vg6EkVlz}
  pay-url: ${MOMO_PAY_URL:https://test-payment.momo.vn/v2/gateway/api/create}
  return-url: ${MOMO_RETURN_URL:http://localhost:3000/checkout/result}
  # MoMo bắt buộc ipnUrl không được blank (validation phía MoMo).
  # Default placeholder: dùng URL local — sandbox MoMo chỉ validate format, không gọi tới được localhost
  # Để IPN thật hoạt động: set MOMO_IPN_URL=https://<ngrok-tunnel>.ngrok-free.app/api/payments/momo/ipn
  ipn-url: ${MOMO_IPN_URL:http://localhost:8080/api/payments/momo/ipn}

---
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    locations: classpath:db/migration
