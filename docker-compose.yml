services:
  # ---------------------------------------------------------------------------
  # Postgres per service (Phase 24 — Database Per Service)
  # Mỗi service có 1 postgres container riêng + credential riêng + volume riêng.
  # KHÔNG expose port host (chỉ accessible trong docker network) — buộc dev dùng
  # `docker exec -it postgres-<svc> psql ...` để truy vấn. Demo failure isolation:
  # dừng 1 postgres-* → các service khác vẫn chạy được.
  # ---------------------------------------------------------------------------
  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: user_svc
      POSTGRES_USER: user_svc
      POSTGRES_PASSWORD: user_svc_pw
    ports:
      - "54321:5432"
    volumes:
      - pgdata-user:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_svc -d user_svc"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-product:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: product_svc
      POSTGRES_USER: product_svc
      POSTGRES_PASSWORD: product_svc_pw
    ports:
      - "54322:5432"
    volumes:
      - pgdata-product:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_svc -d product_svc"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-order:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_svc
      POSTGRES_USER: order_svc
      POSTGRES_PASSWORD: order_svc_pw
    ports:
      - "54323:5432"
    volumes:
      - pgdata-order:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_svc -d order_svc"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-inventory:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory_svc
      POSTGRES_USER: inventory_svc
      POSTGRES_PASSWORD: inventory_svc_pw
    ports:
      - "54324:5432"
    volumes:
      - pgdata-inventory:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_svc -d inventory_svc"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-payment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_svc
      POSTGRES_USER: payment_svc
      POSTGRES_PASSWORD: payment_svc_pw
    ports:
      - "54325:5432"
    volumes:
      - pgdata-payment:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_svc -d payment_svc"]
      interval: 5s
      timeout: 5s
      retries: 10

  # postgres-notification: DB riêng cho notification-service (Phase 23 bootstrap
  # persistence + Phase 24 database-per-service). Lưu dispatch_log + processed_events.
  postgres-notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_svc
      POSTGRES_USER: notification_svc
      POSTGRES_PASSWORD: notification_svc_pw
    ports:
      - "54326:5432"
    volumes:
      - pgdata-notification:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_svc -d notification_svc"]
      interval: 5s
      timeout: 5s
      retries: 10

  # postgres-chat: cho chat_sessions/chat_messages dùng bởi FE Next.js (Phase 22)
  postgres-chat:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chat_svc
      POSTGRES_USER: chat_svc
      POSTGRES_PASSWORD: chat_svc_pw
    ports:
      - "54327:5432"
    volumes:
      - pgdata-chat:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_svc -d chat_svc"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Message broker (Phase 23 — RabbitMQ)
  # Giao tiếp bất đồng bộ giữa các microservice (OrderPlaced → inventory +
  # notification). Management UI tại http://localhost:15672 (guest/guest).
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: tmdt-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - tmdt-rabbitmqdata:/var/lib/rabbitmq

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  # Phase 25: api-gateway là DUY NHẤT backend service expose port ra host.
  # Gateway verify JWT ở edge — cần JWT_SECRET trùng user-service.
  api-gateway:
    build: ./sources/backend/api-gateway
    # Không expose ra host nữa — mọi traffic đi qua Caddy (HTTPS). Chỉ mở trong docker network.
    expose:
      - "8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
      - inventory-service
      - notification-service

  # Phase 25: user-service issue JWT, api-gateway verify — phải chung JWT_SECRET.
  # Bỏ port mapping: chỉ truy cập được qua api-gateway (không expose ra host).
  # Phase 27: thêm RabbitMQ + APP_BASE_URL để AccountEventPublisher publish user.events (MAIL-02).
  user-service:
    build: ./sources/backend/user-service
    depends_on:
      postgres-user:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres-user
      DB_PORT: 5432
      DB_NAME: user_svc
      DB_USER: user_svc
      DB_PASSWORD: user_svc_pw
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USER: guest
      SPRING_RABBITMQ_PASS: guest
      APP_BASE_URL: ${APP_BASE_URL}

  product-service:
    build: ./sources/backend/product-service
    depends_on:
      postgres-product:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres-product
      DB_PORT: 5432
      DB_NAME: product_svc
      DB_USER: product_svc
      DB_PASSWORD: product_svc_pw
      UPLOADS_DIR: /uploads
    volumes:
      - product-uploads:/uploads

  order-service:
    build: ./sources/backend/order-service
    depends_on:
      postgres-order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres-order
      DB_PORT: 5432
      DB_NAME: order_svc
      DB_USER: order_svc
      DB_PASSWORD: order_svc_pw
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USER: guest
      SPRING_RABBITMQ_PASS: guest

  payment-service:
    build: ./sources/backend/payment-service
    depends_on:
      postgres-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres-payment
      DB_PORT: 5432
      DB_NAME: payment_svc
      DB_USER: payment_svc
      DB_PASSWORD: payment_svc_pw
      # Phase 26.1: RabbitMQ — payment-service là producer payment.events
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USER: guest
      SPRING_RABBITMQ_PASS: guest
      # Phase 26.1: MoMo Developer Sandbox credentials (D-19)
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-MOMO}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-F8BBA842ECF85}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-K951B6PE1waDMi640xX08PD3vg6EkVlz}
      MOMO_PAY_URL: ${MOMO_PAY_URL:-https://test-payment.momo.vn/v2/gateway/api/create}
      MOMO_RETURN_URL: ${MOMO_RETURN_URL:-http://74.226.89.57/checkout/result}
      # MoMo bắt buộc ipnUrl phải có format URL hợp lệ (không blank). Localhost không gọi được từ internet —
      # set MOMO_IPN_URL trong .env tới ngrok tunnel để test IPN thật (vd https://abc.ngrok-free.app/api/payments/momo/ipn)
      MOMO_IPN_URL: ${MOMO_IPN_URL:-http://74.226.89.57/api/payments/momo/ipn}

  inventory-service:
    build: ./sources/backend/inventory-service
    depends_on:
      postgres-inventory:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres-inventory
      DB_PORT: 5432
      DB_NAME: inventory_svc
      DB_USER: inventory_svc
      DB_PASSWORD: inventory_svc_pw
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USER: guest
      SPRING_RABBITMQ_PASS: guest

  # Phase 27: thêm SMTP env để EmailSender gửi email thật (MAIL-01 graceful degradation).
  # KHÔNG hardcode credential — dùng ${VAR:-default} từ shell env / .env file của user.
  # Nếu user không cấp MAIL_SMTP_USERNAME/PASSWORD/FROM → graceful degradation (status=SKIPPED).
  notification-service:
    build: ./sources/backend/notification-service
    depends_on:
      postgres-notification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres-notification
      DB_PORT: 5432
      DB_NAME: notification_svc
      DB_USER: notification_svc
      DB_PASSWORD: notification_svc_pw
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USER: guest
      SPRING_RABBITMQ_PASS: guest
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-smtp.gmail.com}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-587}
      MAIL_SMTP_USERNAME: ${MAIL_SMTP_USERNAME:-}
      MAIL_SMTP_PASSWORD: ${MAIL_SMTP_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}

  frontend:
    build:
      context: ./sources/frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    # Không expose ra host nữa — Caddy proxy tới frontend:3000 trong docker network.
    expose:
      - "3000"
    depends_on:
      - api-gateway
      - postgres-chat
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-key-minimum-32-characters-for-hs256-ok}
      DB_HOST: postgres-chat
      DB_PORT: 5432
      DB_NAME: chat_svc
      DB_USER: chat_svc
      DB_PASSWORD: chat_svc_pw
      API_GATEWAY_URL: http://api-gateway:8080
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}

  # Reverse proxy + HTTPS tự động (Let's Encrypt). Là service DUY NHẤT expose ra host.
  # Route same-origin: /api/<service>* → gateway, còn lại → frontend (xem ./Caddyfile).
  # SITE_ADDRESS + ACME_EMAIL lấy từ .env. Cần mở cổng 80 + 443 trên VM.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api-gateway
      - frontend

volumes:
  caddy-data:
  caddy-config:
  pgdata-user:
  pgdata-product:
  pgdata-order:
  pgdata-inventory:
  pgdata-payment:
  pgdata-notification:
  pgdata-chat:
  tmdt-rabbitmqdata:
  product-uploads:
